{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>SIP Calculator</title>

    <link rel="stylesheet" href="{% static 'calculator/css/style.css' %}">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<section class="hero">

    <div class="left">

        <span class="badge">
            Investment Planner
        </span>

        <h1>
            SIP <br> Calculator
        </h1>

        <p>
            Invest smarter.
            Build wealth one month at a time.
        </p>

        <div class="features">

            <div>✓ Compound Growth</div>

            <div>✓ Smart Planning</div>

            <div>✓ Instant Calculation</div>

        </div>

    </div>

    <div class="right">

        <div class="card">

            <h2>Calculate Returns</h2>

            <form>

                <label>Monthly Investment</label>

                <input type="number" placeholder="₹ 5000">

                <label>Expected Annual Return</label>

                <input type="number" placeholder="12 %">

                <label>Investment Duration</label>

                <input type="number" placeholder="10 Years">

                <button>

                    Calculate Returns →

                </button>

            </form>

        </div>

    </div>

</section>

</body>

</html>
